<div class="w-full bg-[#f9fafb] flex flex-col items-center overflow-x-hidden min-h-screen font-sans">

    <!-- Banner (matching the About Us / Door Hardware skewed style) -->
    <div class="w-full relative bg-[#1e3246] h-[250px] md:h-[350px] overflow-hidden flex items-center">
        <!-- Text container -->
        <div class="max-w-7xl mx-auto px-4 w-full relative z-20">
            <h1 class="text-4xl md:text-5xl font-bold text-white tracking-wide">Factory View</h1>
        </div>

        <!-- Right Side Graphics / Yellow Slants -->
        <div
            class="absolute inset-y-0 right-0 w-[50%] md:w-[60%] flex items-stretch z-10 skew-x-[-20deg] transform translate-x-12">
            <!-- First yellow strip -->
            <div class="w-[30%] bg-[#fdbd10]"></div>
            <!-- Gap -->
            <div class="w-[5%] bg-transparent"></div>
            <!-- Second dark gray strip -->
            <div class="w-[10%] bg-[#314a5b]"></div>
            <!-- White strip containing images (simulated) -->
            <div class="w-[55%] bg-white relative overflow-hidden flex flex-wrap content-start">
                <!-- Product images layered loosely exactly like the specific "Factory View" design block -->
                <img src="/image/dorrr-768x512.jpg"
                    class="w-32 h-32 object-cover skew-x-[20deg] absolute top-10 left-10 rounded shadow-sm border"
                    alt="Hardware">
                <img src="/image/dei-casting.jpg"
                    class="w-40 h-40 object-cover skew-x-[20deg] absolute top-32 right-10 rounded shadow-sm border"
                    alt="Hardware 2">
            </div>
        </div>
    </div>

    <!-- Main Grid Cards Section -->
    <section class="max-w-[1400px] w-full mx-auto px-4 py-16 md:py-24">

        <!-- Flex wrap container with justify center so the 2 remaining cards center perfectly on the second row -->
        <div class="flex flex-wrap justify-center gap-6">

            <div *ngFor="let card of factoryCards"
                class="w-full sm:w-[calc(50%-1.5rem)] md:w-[calc(33.333%-1.5rem)] lg:w-[calc(25%-1.5rem)] bg-white shadow hover:shadow-lg transition-all duration-300 flex flex-col p-6 items-center">

                <!-- Card Image Box -->
                <div class="w-full aspect-[4/3] mb-6 overflow-hidden flex items-center justify-center bg-gray-50">
                    <img [src]="card.image" [alt]="card.title" class="w-full h-full object-cover">
                </div>

                <!-- Card Body -->
                <div class="flex flex-col flex-1 justify-between items-center text-center gap-6 mt-auto">
                    <!-- Title -->
                    <h3 class="text-[#1e3246] font-semibold text-[15px] leading-snug max-w-[90%]">
                        {{card.title}}
                    </h3>

                    <!-- Call to action pill -->
                    <a [href]="card.link"
                        class="bg-[#1e3246] text-white px-8 py-2.5 shadow hover:bg-[#2c4762] transition-colors text-sm font-medium">
                        Learn more
                    </a>
                </div>

            </div>

        </div>

    </section>

</div>
